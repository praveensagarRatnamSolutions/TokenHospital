<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b9dee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                        "teal-accent": "#008080",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
        @keyframes bounce-up {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
        .animate-bounce-up {
            animation: bounce-up 2s infinite;
        }
    </style></head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Main Kiosk Container (1080x1920 aspect simulation) -->
<div class="relative mx-auto min-h-screen max-w-[1080px] flex flex-col shadow-2xl overflow-hidden bg-white">
<!-- Header / Carousel Section -->
<header class="relative w-full overflow-hidden h-[80vh] flex flex-col justify-between">
<div class="absolute inset-0 bg-gradient-to-br from-primary/80 to-teal-accent/60 mix-blend-multiply z-10"></div>
<div class="absolute inset-0 bg-cover bg-center" data-alt="Healthcare professionals working in a modern hospital setting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBXtPiFJVFkXS4Y4V-IrE_b91hGoZQfupUuVtXM0IZqxJOCLfhgCYZSafw915cGF67cCgGLgF15WhK7tU0gWRp7bEnemydiFogb3k3ul-RcBuu1-9jBNP23TByGBMFvkbSGj4GDndeGsWSAVgoQQcr2R0HKNohQ72D677XzGv_P5zJoYDUCFMVlo6RsP8k9rROcx3MlHzeSuLAOO0pBOOxnpvaTZ8DxeUSkv62HTo6WFV8k2v58sDK8trOqD1Kw7nfQvJ-ljQ3XZXh3')"></div>
<div class="relative z-20 h-full flex flex-col p-12 pb-16 text-white pt-24">
<div class="flex items-center gap-4 mb-6">
<span class="material-symbols-outlined text-5xl">medical_services</span>
<div class="h-1 w-24 bg-white/40 rounded-full"></div>
</div>
<h1 class="text-6xl font-extrabold leading-tight tracking-tight mb-4">
                    We Are The Best <br/>Health Care Services
                </h1>
<p class="text-2xl font-medium text-white/90 max-w-2xl">
                    Leading the way in medical excellence. Your health and comfort are our top priorities.
                </p>
</div>
<!-- Carousel Indicators -->
<div class="absolute bottom-6 right-12 z-20 flex gap-3">
<div class="w-12 h-2 bg-white rounded-full"></div>
<div class="w-3 h-2 bg-white/40 rounded-full"></div>
<div class="w-3 h-2 bg-white/40 rounded-full"></div>
</div>
<!-- Swipe up to get token interaction area -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-2">
<div class="glass-effect px-8 py-4 rounded-full flex flex-col items-center shadow-lg border border-white/20">
<span class="material-symbols-outlined text-white text-4xl animate-bounce-up">keyboard_double_arrow_up</span>
<span class="text-white text-xl font-bold tracking-wider uppercase">Swipe up to get token</span>
</div>
<div class="w-1 h-12 bg-gradient-to-t from-white/60 to-transparent rounded-full mt-2"></div>
</div></header>
<!-- Middle Section: Call to Action -->
<!-- Bottom Section: Token Queue Progress -->
<footer class="bg-white border-t border-slate-200 p-4 h-[20vh] flex flex-col justify-center">
<div class="relative flex justify-between items-start max-w-5xl mx-auto max-w-6xl">
<!-- Progress Line -->
<div class="absolute top-8 left-20 right-20 h-1 bg-slate-200 z-0">
<div class="h-full bg-teal-accent w-1/3"></div>
</div>
<!-- Step 1: Completed -->
<div class="relative z-10 flex flex-col items-center w-40 opacity-70">
<div class="w-16 h-16 rounded-full bg-slate-200 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-slate-500 text-3xl">check</span>
</div>
<span class="text-lg font-bold text-slate-400">A-142</span>
<span class="text-sm font-medium text-slate-400">Completed</span>
</div>
<!-- Step 2: Current -->
<div class="relative z-10 flex flex-col items-center w-40"><div class="w-24 h-24 rounded-full bg-teal-accent flex items-center justify-center mb-4 shadow-xl shadow-teal-accent/40 ring-8 ring-teal-accent/20 transition-transform hover:scale-105">
<span class="text-white text-3xl font-black">A-143</span>
</div>
<span class="text-2xl font-black text-teal-accent tracking-tight">CURRENT</span>
<span class="text-base font-semibold text-slate-600 uppercase tracking-wider">Counter 04</span></div><!-- Step 2.5: Emergency -->
<div class="relative z-10 flex flex-col items-center w-48">
<div class="w-20 h-20 rounded-full bg-rose-500 flex items-center justify-center mb-4 shadow-lg shadow-rose-500/30 ring-8 ring-rose-500/10">
<span class="text-white text-2xl font-black uppercase">E-09</span>
</div>
<span class="text-xl font-bold text-rose-500">EMERGENCY</span>
<span class="text-sm font-medium text-slate-500">Priority Ward</span>
</div>
<!-- Step 3: Next -->
<div class="relative z-10 flex flex-col items-center w-40"><div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center mb-4 border-2 border-primary/30">
<span class="text-primary text-xl font-bold">A-144</span>
</div>
<span class="text-lg font-bold text-slate-600">NEXT</span>
<span class="text-sm font-medium text-slate-400">Est. 5 min</span></div>
</div>
<!-- Footer Bottom Nav -->
</footer>
</div>
<!-- Bottom Nav Bar Component Integration -->
</body></html>
