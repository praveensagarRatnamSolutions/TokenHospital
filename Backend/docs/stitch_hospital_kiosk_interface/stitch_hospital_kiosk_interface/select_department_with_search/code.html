<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b9dee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Hospital Kiosk - Select Department</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Kiosk Container: 1080x1920 Proportions handled by max-w and aspect -->
<div class="relative mx-auto flex h-screen w-full max-w-[1080px] flex-col bg-background-light dark:bg-background-dark">
<!-- TopAppBar / Header Section -->
<header class="flex flex-col items-center pt-16 pb-12 px-8 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
<div class="mb-8">
<div class="size-24 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-5xl">local_hospital</span>
</div>
</div>
<h1 class="text-5xl font-bold tracking-tight text-slate-900 dark:text-white mb-4">Select Department</h1>
<p class="text-2xl text-slate-500 dark:text-slate-400 font-medium">Please choose the department you want to visit.</p><div class="w-full max-w-2xl mt-8 relative group">
<div class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-3xl text-slate-400 group-focus-within:text-primary transition-colors">search</span>
</div>
<input class="block w-full h-20 pl-16 pr-6 text-2xl font-medium text-slate-900 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Search department..." type="text"/>
</div>
</header>
<!-- Main Content: Grid of Department Cards -->
<main class="flex-1 overflow-y-auto p-12">
<div class="grid grid-cols-2 gap-8 h-full">
<!-- General Medicine -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">stethoscope</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">General Medicine</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Internal &amp; Routine Care</p>
</div>
</button>
<!-- Cardiology -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">favorite</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Cardiology</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Heart Health Center</p>
</div>
</button>
<!-- Orthopedics -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">skeleton</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Orthopedics</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Bone &amp; Joint Specialist</p>
</div>
</button>
<!-- Pediatrics -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">child_care</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Pediatrics</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Child &amp; Infant Health</p>
</div>
</button>
<!-- ENT -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">hearing</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">ENT</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Ear, Nose, &amp; Throat</p>
</div>
</button>
<!-- Dermatology -->
<button class="flex flex-col items-start justify-between p-10 rounded-xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 shadow-xl hover:border-primary transition-all group">
<div class="size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">vaccines</span>
</div>
<div class="text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Dermatology</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Skin &amp; Aesthetic Care</p>
</div>
</button>
</div>
</main>
<!-- Footer / Navigation Section -->
<footer class="p-12 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex justify-between items-center">
<button class="flex items-center justify-center gap-4 h-24 px-12 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-3xl font-bold shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">arrow_back</span>
<span>Back</span>
</button>
<div class="flex items-center gap-6">
<div class="text-right">
<p class="text-slate-400 text-lg uppercase tracking-widest font-bold">Emergency</p>
<p class="text-primary text-3xl font-bold">Dial 911</p>
</div>
<div class="size-16 rounded-full bg-red-100 flex items-center justify-center text-red-600">
<span class="material-symbols-outlined text-4xl">emergency</span>
</div>
</div>
</footer>
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 -z-10 opacity-5 dark:opacity-10 pointer-events-none">
<svg height="600" viewbox="0 0 200 200" width="600" xmlns="http://www.w3.org/2000/svg">
<path d="M45.7,-77.4C58.9,-71.1,69.1,-58.5,77.1,-44.6C85.1,-30.7,90.9,-15.3,91.3,0.2C91.7,15.8,86.7,31.5,78.2,45.1C69.7,58.7,57.7,70.1,43.7,77.2C29.7,84.3,13.8,87.1,-1.5,89.7C-16.8,92.3,-33.5,94.7,-48.5,88.9C-63.5,83.1,-76.8,69.1,-84.8,53C-92.8,36.9,-95.5,18.5,-94.1,0.8C-92.7,-16.9,-87.3,-33.8,-77.7,-47.9C-68.1,-62,-54.3,-73.3,-39.7,-78.7C-25.1,-84.1,-9.6,-83.6,3.6,-89.9C16.8,-96.2,32.5,-83.7,45.7,-77.4Z" fill="#2b9dee" transform="translate(100 100)"></path>
</svg>
</div>
</div>
</body></html>
